spring.application.name=demo

# Mostrar cada dependência (db, minio, vault...) no /actuator/health,
# não só o status agregado.
management.endpoint.health.show-components=always
management.endpoint.health.show-details=always

# MinIO (ADR-005) — valores vêm do compose; defaults para rodar fora do Docker
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:}
minio.bucket=${MINIO_BUCKET:artigos}

# Não deixar o health check do SMTP derrubar o /actuator/health.
# O envio de e-mail (RF08/RF22) é assíncrono e o SMTP institucional é opcional
# em desenvolvimento; sem isto, o backend fica "unhealthy" e o Nginx não sobe.
management.health.mail.enabled=false

# O DDL da sessão é criado pela migration V1 (Flyway); a aplicação roda como
# lab_app, que não tem permissão de CREATE no schema.
spring.session.jdbc.initialize-schema=never
