spring.application.name=demo

# Não deixar o health check do SMTP derrubar o /actuator/health.
# O envio de e-mail (RF08/RF22) é assíncrono e o SMTP institucional é opcional
# em desenvolvimento; sem isto, o backend fica "unhealthy" e o Nginx não sobe.
management.health.mail.enabled=false

# Cria a tabela SPRING_SESSION na inicialização (Postgres não a cria sozinho).
# Provisório: quando o Flyway entrar (Fase 1), o DDL da sessão vira uma migration
# e este valor passa a "never".
spring.session.jdbc.initialize-schema=always
