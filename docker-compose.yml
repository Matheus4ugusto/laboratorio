name: laboratorio-publicacoes

# Estrutura alinhada ao ADR-009 (Docker + Compose + Nginx) e ADR-007 (Vault Transit).
# - Apenas o Nginx publica portas (443/80). Postgres, MinIO e Vault ficam na rede
#   interna isolada, sem portas publicadas (defesa em profundidade).
# - Este arquivo é o baseline de DESENVOLVIMENTO. Para produção use um
#   docker-compose.prod.yml de override (Vault com storage persistente + unseal
#   Shamir, certificados TLS reais, sem serviços *-init e sem portas de debug).

services:
  # ---------------------------------------------------------------------------
  # Proxy reverso — único ponto exposto (TLS 1.2+, HSTS, roteamento / e /api)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80" # apenas redirect 80 -> 443
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro # cert + chave TLS (não versionar)
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - edge
    healthcheck:
      # 127.0.0.1 (não "localhost"): dentro do container localhost resolve para
      # ::1 (IPv6) primeiro, e o nginx só escuta em IPv4 -> daria connection refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Frontend Next.js (área pública responsiva + módulo autenticado desktop-only)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # O browser fala com o Nginx; o SSR do Next fala com o backend pela rede interna
      NEXT_PUBLIC_API_BASE_URL: /api
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edge

  # ---------------------------------------------------------------------------
  # Backend Spring Boot (API REST, regras de negócio, cripto envelope, auditoria)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: backend/lab
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # PostgreSQL (ADR-004) — Flyway roda na inicialização
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: lab_app
      SPRING_DATASOURCE_PASSWORD: ${LAB_APP_PASSWORD}
      # Vault (ADR-007) — KEK no engine Transit
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: ${VAULT_TOKEN}
      SPRING_CLOUD_VAULT_TRANSIT_ENABLED: "true"
      APP_CRYPTO_KEK_NAME: ${VAULT_KEK_NAME}
      # MinIO / S3 (ADR-005)
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      # SMTP institucional (RF08/RF22) — ajuste conforme o ambiente
      SPRING_MAIL_HOST: ${SMTP_HOST}
      SPRING_MAIL_PORT: ${SMTP_PORT}
      SPRING_FLYWAY_USER: ${POSTGRES_USER}
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      # Tabelas de sessão criadas pelo Flyway (lab_app não tem CREATE no schema)
      SPRING_SESSION_JDBC_INITIALIZE_SCHEMA: never
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - edge
      - internal
    healthcheck:
      # Requer spring-boot-starter-actuator no pom (expor /actuator/health)
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # PostgreSQL (ADR-004) — sem portas publicadas
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LAB_APP_PASSWORD: ${LAB_APP_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — object storage S3 (ADR-005) — sem portas publicadas
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Cria o bucket na primeira subida (one-shot)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      echo 'bucket ${MINIO_BUCKET} pronto';
      "
    networks:
      - internal
    restart: "no"

  # ---------------------------------------------------------------------------
  # HashiCorp Vault (ADR-007) — KEK da criptografia envelope. DEV MODE.
  # Em produção: storage raft/file + unseal Shamir + sem VAULT_DEV_*.
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Habilita o engine Transit e cria a KEK (one-shot, só dev)
  vault-init:
    image: hashicorp/vault:1.18
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    entrypoint: >
      /bin/sh -c "
      vault secrets enable -path=transit transit 2>/dev/null || true;
      vault write -f transit/keys/${VAULT_KEK_NAME} type=aes256-gcm96 2>/dev/null || true;
      echo 'engine transit + KEK ${VAULT_KEK_NAME} prontos';
      "
    networks:
      - internal
    restart: "no"

volumes:
  pg_data:
  minio_data:

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true # sem rota para fora: postgres/minio/vault ficam isolados
