# Configuração do Nginx — proxy reverso do Sistema Web do Laboratório.
# Alinhada ao ADR-009 (terminação TLS, roteamento) e RNF02 (TLS 1.2+ / HSTS).
#
# Resumo do que este arquivo faz:
#   1. Porta 80  -> responde o healthcheck e redireciona todo o resto para HTTPS.
#   2. Porta 443 -> termina o TLS e roteia:  /api -> backend  |  resto -> frontend.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;

    # Tamanho máximo de upload (artigos PDF e cartas de aceite — RF14/RF23).
    # Casado com o [413] da especificação da API. Ajuste conforme necessário.
    client_max_body_size 25m;

    # Compressão de estáticos — ajuda no tempo de resposta da área pública (RNF06).
    gzip              on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      application/xml text/xml image/svg+xml;

    # "Apartamentos" para onde o Nginx encaminha. Os nomes 'frontend' e 'backend'
    # são os nomes dos serviços no docker-compose.yml; o Docker os resolve na
    # rede interna. Não se usa IP.
    upstream frontend_upstream { server frontend:3000; }
    upstream backend_upstream  { server backend:8080; }

    # ---------------------------------------------------------------------------
    # Porta 80 (HTTP) — só healthcheck e redirecionamento para HTTPS.
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Endpoint consumido pelo healthcheck do Nginx no docker-compose.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Qualquer acesso http:// é forçado para https://.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # Porta 443 (HTTPS) — terminação TLS + roteamento.
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # Certificado TLS. Em desenvolvimento é autoassinado (ver comando openssl);
        # em produção, o certificado real da instituição substitui estes arquivos.
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # RNF02: apenas TLS 1.2 e 1.3.
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # HSTS — instrui o navegador a só usar HTTPS neste domínio (RNF02 / seção 11).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---- Rota da API: tudo que começa com /api vai para o Spring Boot ----
        # Sem barra final no proxy_pass: o caminho /api/... é preservado, pois os
        # endpoints do backend já são definidos sob o prefixo /api.
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Todo o resto vai para o frontend Next.js ----
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Necessário para o hot-reload (WebSocket) do Next.js em desenvolvimento.
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
